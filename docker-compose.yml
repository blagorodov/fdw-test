name: fdw

services:
  php:
    build:
      context: ./docker/php
    volumes:
      - .:/var/www
    working_dir: /var/www

  nginx:
    image: nginx:1.27-alpine
    ports:
      - "80:80"
    volumes:
      - ./public:/var/www/public:ro
      # Laravel stores uploads under storage/app/public; public/storage is a symlink there.
      # Only ./public is mounted above, so the symlink target is missing inside nginx → 403.
      # Bind the real directory so /storage/* URLs resolve.
      - ./storage/app/public:/var/www/public/storage:ro
      - ./docker/nginx/default.conf:/etc/nginx/conf.d/default.conf:ro
    depends_on:
      - php

  postgres:
    image: postgres:17-alpine
    ports:
      - "5432:5432"
    environment:
      POSTGRES_DB: laravel
      POSTGRES_USER: laravel
      POSTGRES_PASSWORD: laravel
    volumes:
      - postgres_data:/var/lib/postgresql/data

volumes:
  postgres_data:
